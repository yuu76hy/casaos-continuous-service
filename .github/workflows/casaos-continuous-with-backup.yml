name: CasaOS纯净部署（单服务器并行-修复版）

on:
  workflow_dispatch:
  repository_dispatch:
    types: [renew_casaos_snapshot]

env:
  RETRY_TIMES: 3
  ZSTD_COMPRESS_LEVEL: 1
  POLL_INTERVAL: 60
  TARGET_RUN_MINUTES: 10
  PERSONAL_DATA_DIRS: "/var/lib/docker /etc/casaos /var/lib/casaos /DATA"
  REMOTE_BACKUP_BASE: "/aaa"
  LOCAL_BACKUP_DIR: "/tmp/casaos-backup"
  LOCAL_AAA_DIR: "/aaa"
  SSH_USER: "root"
  LOG_PREFIX: "[日志]"

jobs:
  casaos-deploy:
    runs-on: ubuntu-24.04
    timeout-minutes: 480
    env:
      ROOTS_PASSWORD: ${{ secrets.ROOTS_PASSWORD }}
      USER_PAT: ${{ secrets.USER_PAT }}
      REPO: ${{ secrets.REPO }}
      TAILSCALE_AUTH_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
      SSH_PASS: ${{ secrets.ROOTS_PASSWORD }}

    steps:
      - name: 系统初始化(串行) + Docker/CasaOS/管理员(并行)
        run: |
          task1_init() {
            echo "$LOG_PREFIX === 系统初始化开始 ==="
            sudo apt update -y -qq || true
            sudo apt install -y curl wget jq tar gzip lsof ca-certificates gnupg sshpass openssh-server zstd -qq || true
            sudo rm -rf /usr/local/lib /usr/local/.ghcup /usr/local/julia* /usr/local/aws-* /usr/local/n || true
            sudo rm -rf /opt/hostedtoolcache /opt/actionarchivecache /opt/runner-cache /opt/microsoft /opt/google || true
            sudo rm -rf /tmp/* /var/tmp/* ~/.cache/* /root/.cache/* /var/cache/apt/* || true
            sudo DEBIAN_FRONTEND=noninteractive apt autoremove --purge -y || true
            sudo DEBIAN_FRONTEND=noninteractive apt clean || true
            echo "$LOG_PREFIX === 系统初始化完成 ==="
          }

          task2_docker() {
            echo "$LOG_PREFIX === 安装Docker开始 ==="
            export DEBIAN_FRONTEND=noninteractive
            for i in 1 2 3; do
              curl -fsSL https://get.docker.com | sudo bash && break || sleep 3
            done
            sudo systemctl enable docker containerd || true
            sudo systemctl stop docker containerd || true
            DOCKER_VER=$(docker --version 2>/dev/null || echo "未安装")
            echo "$LOG_PREFIX Docker 版本: $DOCKER_VER"
            sudo usermod -aG docker runner || true
            echo "$LOG_PREFIX === Docker安装完成 ==="
          }

          task3_casaos() {
            echo "$LOG_PREFIX === 安装CasaOS开始 ==="
            for i in 1 2 3; do
              curl -fsSL https://get.casaos.io | sudo bash && break || {
                echo "$LOG_PREFIX CasaOS安装失败，重试 $i/3"
                sleep 5
              }
            done
            sudo systemctl stop casaos || true
            sudo systemctl disable casaos || true
            if command -v casaos &>/dev/null; then
              echo "$LOG_PREFIX ✅ CasaOS 安装成功: $(casaos --version 2>/dev/null)"
            else
              echo "$LOG_PREFIX ❌ CasaOS 安装失败！"
              exit 1
            fi
            echo "$LOG_PREFIX === CasaOS安装完成 ==="
          }

          task4_admin() {
            echo "$LOG_PREFIX === 配置管理员开始 ==="
            if [ -z "$SSH_PASS" ]; then
              echo "$LOG_PREFIX 警告：未配置ROOTS_PASSWORD"
            else
              USER_NAME="$SSH_USER"
              id -u "$USER_NAME" &>/dev/null || sudo useradd -m -s /bin/bash "$USER_NAME" || true
              echo "$USER_NAME:$SSH_PASS" | sudo chpasswd || true
              echo "$USER_NAME ALL=(ALL) NOPASSWD: ALL" | sudo tee /etc/sudoers.d/"$USER_NAME" >/dev/null || true
              sudo chmod 0440 /etc/sudoers.d/"$USER_NAME" || true
              sudo usermod -aG docker "$USER_NAME" || true
              SSH_CONF="/etc/ssh/sshd_config"
              sudo sed -i \
                -e 's/^#*PermitRootLogin.*/PermitRootLogin yes/' \
                -e 's/^#*PasswordAuthentication.*/PasswordAuthentication yes/' \
                -e 's/^#*PubkeyAuthentication.*/PubkeyAuthentication yes/' \
                "$SSH_CONF" || true
              sudo systemctl restart ssh || true
            fi
            echo "$LOG_PREFIX === 管理员配置完成 ==="
          }

          echo "$LOG_PREFIX 第一步：串行执行系统初始化（避免APT锁冲突）"
          task1_init

          echo "$LOG_PREFIX 第二步：并行执行 Docker/CasaOS/管理员"
          task2_docker &
          task3_casaos &
          task4_admin &
          wait

          echo "$LOG_PREFIX ✅ 所有初始化任务全部完成"

      - name: 5-Tailscale组网
        run: |
          TS_SUFFIX=$((RANDOM % 1000))
          TS_HOSTNAME="CasaOS-${TS_SUFFIX}"
          echo "$LOG_PREFIX === 5-Tailscale组网开始 ==="
          
          if [ -z "$TAILSCALE_AUTH_KEY" ]; then
            echo "$LOG_PREFIX Tailscale未配置，跳过"
          else
            echo "$LOG_PREFIX 安装Tailscale..."
            for i in 1 2 3; do
              curl -fsSL https://tailscale.com/install.sh | sudo bash && break || sleep 2
            done
            sudo systemctl enable --now tailscaled || true
            sleep 2
            echo "$LOG_PREFIX 连接Tailscale网络..."
            for i in 1 2 3; do
              sudo tailscale up --authkey="$TAILSCALE_AUTH_KEY" --hostname="$TS_HOSTNAME" --accept-routes --reset && break || sleep 3
            done
            echo ""
            echo "$LOG_PREFIX === 本机IP信息 ==="
            LOCAL_IP=$(hostname -I | cut -d' ' -f1)
            TAILSCALE_IP=$(sudo tailscale ip -4 2>/dev/null || echo "获取失败")
            echo "$LOG_PREFIX 物理内网IP: $LOCAL_IP"
            echo "$LOG_PREFIX Tailscale内网IP: $TAILSCALE_IP"
            echo "$LOG_PREFIX 本机Tailscale主机名: $TS_HOSTNAME"
            echo "================================"
          fi
          echo "$LOG_PREFIX 5-Tailscale组网完成"

      - name: 6-拉取备份恢复（双bug修复版）
        run: |
          echo "$LOG_PREFIX === 6-拉取备份开始 ==="
          
          if [ -z "$TAILSCALE_AUTH_KEY" ] || [ -z "$SSH_PASS" ]; then
            echo "$LOG_PREFIX 未配置Tailscale/SSH，纯净启动"
          else
            TS_STATUS=$(sudo tailscale status --json 2>/dev/null || echo '{"Peer":[]}')
            SELF_ID=$(echo "$TS_STATUS" | jq -r '.Self.ID // empty')
            echo "$LOG_PREFIX 🔍 本机Tailscale ID: $SELF_ID"
            echo "$LOG_PREFIX 🔍 所有在线Peer列表："
            echo "$TS_STATUS" | jq -r '.Peer[] | select(.Online == true) | "  ID: \(.ID) | HostName: \(.HostName)"' || echo "  无在线Peer"
            
            TARGET_LIST=$(echo "$TS_STATUS" | jq -r --arg self "$SELF_ID" '
              .Peer[] | select(.Online == true) | select(.ID != $self) |
              select( (.HostName | tostring | ascii_downcase) | contains("casaos") ) |
              "\(.HostName)//\(.TailscaleIPs[0])"
            ' 2>/dev/null || true)
            
            echo "$LOG_PREFIX 🔍 筛选后目标节点列表："
            if [ -z "$TARGET_LIST" ]; then
              echo "  无符合条件的CasaOS节点"
              echo "$LOG_PREFIX 未找到符合条件节点，纯净启动"
            else
              echo "$TARGET_LIST" | while IFS= read -r line; do echo "  $line"; done
              echo "$LOG_PREFIX 发现节点: $TARGET_LIST"
              sudo fuser -k 80/tcp 443/tcp 2>/dev/null || true
              sudo systemctl stop docker containerd casaos 2>/dev/null || true
              sudo pkill -9 -f "casaos" 2>/dev/null || true
              sudo pkill -9 -f "docker" 2>/dev/null || true
              sudo pkill -9 -f "containerd" 2>/dev/null || true
              sync && sleep 2
              
              echo "$TARGET_LIST" | while IFS= read -r line; do
                HOST=$(echo "$line" | cut -d'/' -f1)
                IP=$(echo "$line" | cut -d'/' -f3)
                echo "$LOG_PREFIX 尝试节点: $HOST ($IP)"
                
                LATEST_FILE=$(sshpass -p "$SSH_PASS" ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 \
                  "$SSH_USER@$IP" "ls -t \"$REMOTE_BACKUP_BASE\"/casaos-*.tar.zst 2>/dev/null | head -1" 2>/dev/null || true)
                
                if [ -n "$LATEST_FILE" ]; then
                  echo "$LOG_PREFIX 发现备份: $LATEST_FILE"
                  LOCAL_FILE="$LOCAL_BACKUP_DIR/$(basename "$LATEST_FILE")"
                  mkdir -p "$LOCAL_BACKUP_DIR"
                  
                  if sshpass -p "$SSH_PASS" scp -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
                    "$SSH_USER@$IP:$LATEST_FILE" "$LOCAL_FILE" 2>/dev/null; then
                    echo "$LOG_PREFIX 拉取成功，删除远程文件..."
                    sshpass -p "$SSH_PASS" ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 \
                      "$SSH_USER@$IP" "sudo rm -f '$LATEST_FILE'" 2>/dev/null || true
                    
                    echo "$LOG_PREFIX 开始解压恢复..."
                    sudo tar --zstd -xf "$LOCAL_FILE" -C / --overwrite --preserve-permissions 2>/dev/null || true
                    
                    for dir in $PERSONAL_DATA_DIRS; do
                      [ -d "$dir" ] && sudo chown -R root:root "$dir" 2>/dev/null || true
                    done
                    rm -f "$LOCAL_FILE"
                    echo "$LOG_PREFIX 节点 $HOST 恢复成功！"
                    break
                  fi
                fi
              done
            fi
          fi
          echo "$LOG_PREFIX 6-拉取备份完成"

      - name: 7-启动服务
        run: |
          echo "$LOG_PREFIX === 7-启动服务开始 ==="
          sudo fuser -k 80/tcp 443/tcp 2>/dev/null || true
          sudo mkdir -p /run/docker
          sudo systemctl daemon-reload || true
          sudo systemctl enable --now docker containerd || true
          sleep 5
          sudo systemctl enable --now casaos || true
          echo "$LOG_PREFIX Docker状态: $(systemctl is-active docker 2>/dev/null || echo 'unknown')"
          echo "$LOG_PREFIX CasaOS状态: $(systemctl is-active casaos 2>/dev/null || echo 'unknown')"
          echo "$LOG_PREFIX 7-启动服务完成"

      - name: 8-稳定运行
        timeout-minutes: 360
        run: |
          echo "$LOG_PREFIX === 8-稳定运行 $TARGET_RUN_MINUTES 分钟 ==="
          RUN_SECONDS=$((TARGET_RUN_MINUTES * 60))
          ELAPSED=0
          while [ $ELAPSED -lt $RUN_SECONDS ]; do
            MINUTES=$((ELAPSED / 60))
            echo "$LOG_PREFIX 已运行 $MINUTES / $TARGET_RUN_MINUTES 分钟..."
            sleep 60
            ELAPSED=$((ELAPSED + 60))
            [ $((MINUTES % 10)) -eq 0 ] && [ $MINUTES -gt 0 ] && echo "$LOG_PREFIX 心跳: Docker=$(systemctl is-active docker 2>/dev/null || echo '?') CasaOS=$(systemctl is-active casaos 2>/dev/null || echo '?')"
          done
          echo "$LOG_PREFIX 8-稳定运行完成"

      - name: 9-停止服务（保留Tailscale）
        run: |
          echo "$LOG_PREFIX === 9-停止服务开始 ==="
          sudo fuser -k 80/tcp 443/tcp 2>/dev/null || true
          sudo systemctl stop casaos docker containerd 2>/dev/null || true
          sudo pkill -9 -f "casaos" 2>/dev/null || true
          sudo pkill -9 -f "docker" 2>/dev/null || true
          sudo pkill -9 -f "containerd" 2>/dev/null || true
          echo "$LOG_PREFIX 9-停止服务完成"

      - name: 10-本地全量备份（tar.zst 最快压缩 + 多线程 + 容错）
        if: ${{ always() }}
        run: |
          set +e
          echo "===== [日志] 10-生成本地全量备份 开始 ====="
          sudo mkdir -p "$LOCAL_BACKUP_DIR" || true
          IFS=' ' read -r -a DIR_ARRAY <<< "$PERSONAL_DATA_DIRS"
          for dir in "${DIR_ARRAY[@]}"; do
            [ ! -d "$dir" ] && sudo mkdir -p "$dir" || true
          done
          SNAP_NAME="casaos-full-$(date +%Y%m%d-%H%M%S).tar.zst"
          LOCAL_FILE="$LOCAL_BACKUP_DIR/$SNAP_NAME"
          echo "[日志] 备份文件：$SNAP_NAME"
          
          sudo tar -I"zstd -$ZSTD_COMPRESS_LEVEL -T0" -cf "$LOCAL_FILE" \
            --ignore-failed-read --preserve-permissions \
            "${DIR_ARRAY[@]}" || true
          
          if [ -f "$LOCAL_FILE" ] && [ -s "$LOCAL_FILE" ]; then
            FILE_SIZE=$(du -h "$LOCAL_FILE" | cut -f1)
            echo "[日志] ✅ 备份有效 (大小: $FILE_SIZE)"
            echo "BACKUP_FILE=$LOCAL_FILE" >> $GITHUB_ENV || true
            echo "SNAP_NAME=$SNAP_NAME" >> $GITHUB_ENV || true
          else
            echo "[日志] ❌ 备份文件无效"
            exit 0
          fi
          echo "✅ [日志] 10-备份完成"

      - name: 11-触发下一轮
        run: |
          echo "$LOG_PREFIX === 11-触发下一轮 ==="
          if [ -z "$USER_PAT" ] || [ -z "$REPO" ]; then
            echo "$LOG_PREFIX 未配置PAT/REPO，跳过"
          else
            for retry in 1 2 3; do
              curl -s -f -X POST -H "Authorization: token $USER_PAT" -H "Content-Type: application/json" \
                https://api.github.com/repos/$REPO/dispatches \
                -d '{"event_type":"renew_casaos_snapshot"}' 2>/dev/null && echo "$LOG_PREFIX dispatch成功" && break
              sleep 3
            done
          fi
          echo "$LOG_PREFIX 11-触发下一轮完成"

      - name: 12-轮询等待删除（权限修复版）
        timeout-minutes: 1440
        run: |
          echo "$LOG_PREFIX === 12-轮询删除开始 ==="
          if [ -z "$BACKUP_FILE" ] || [ -z "$SNAP_NAME" ]; then
            echo "$LOG_PREFIX 无备份文件，跳过"
          else
            sudo mkdir -p "$LOCAL_AAA_DIR" || true
            sudo chown runner:runner "$LOCAL_AAA_DIR" || true
            TARGET_FILE="$LOCAL_AAA_DIR/$SNAP_NAME"
            sudo mv -v "$BACKUP_FILE" "$TARGET_FILE" 2>/dev/null || true
            
            if [ -f "$TARGET_FILE" ]; then
              FILE_SIZE=$(sudo stat -c%s "$TARGET_FILE" 2>/dev/null || echo "0")
              echo "$LOG_PREFIX 监控文件: $SNAP_NAME ($(numfmt --to=iec $FILE_SIZE 2>/dev/null || echo "$FILE_SIZE bytes"))"
              echo "$LOG_PREFIX 无限轮询等待删除..."
              
              POLL_COUNT=0
              while [ -f "$TARGET_FILE" ]; do
                CURRENT_SIZE=$(sudo stat -c%s "$TARGET_FILE" 2>/dev/null || echo "0")
                [ "$CURRENT_SIZE" != "$FILE_SIZE" ] && echo "$LOG_PREFIX 文件变化" && FILE_SIZE=$CURRENT_SIZE
                echo "$LOG_PREFIX 等待中... ($POLL_COUNT)"
                sleep $POLL_INTERVAL
                POLL_COUNT=$((POLL_COUNT + 1))
              done
              echo "$LOG_PREFIX 文件已被删除，退出"
            fi
          fi
          echo "$LOG_PREFIX 12-轮询删除完成"

      - name: 13-最终清理（保留Tailscale）
        run: |
          echo "$LOG_PREFIX === 13-最终清理 ==="
          sudo rm -rf "$LOCAL_BACKUP_DIR" /tmp/* 2>/dev/null || true
          sudo rm -f /etc/sudoers.d/root 2>/dev/null || true
          sudo apt autoremove -y -qq 2>/dev/null || true
          sudo apt clean -y -qq 2>/dev/null || true
          echo "$LOG_PREFIX 13-最终清理完成"
          echo "$LOG_PREFIX === 全流程结束 ==="
