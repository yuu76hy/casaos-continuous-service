name: CasaOS纯净部署（Tailscale内网版 /aaa目录 拉取即删 无限检测删除）
on:
  workflow_dispatch:
  repository_dispatch:
    types: [renew_casaos_snapshot]

jobs:
  casaos-deploy:
    runs-on: ubuntu-24.04
    timeout-minutes: 480
    env:
      PERSONAL_DATA_DIRS: "/var/lib/docker /etc/casaos /var/lib/casaos /DATA"
      ROOTS_PASSWORD: ${{ secrets.ROOTS_PASSWORD }}
      USER_PAT: ${{ secrets.USER_PAT }}
      REPO: ${{ secrets.REPO }}
      TAILSCALE_AUTH_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
      SSH_USER: "root"
      SSH_PASS: ${{ secrets.ROOTS_PASSWORD }}
      REMOTE_BACKUP_BASE: "/aaa"
      LOCAL_BACKUP_DIR: "/tmp/casaos-backup"
      TARGET_RUN_MINUTES: 300
      RETRY_TIMES: 2
      ZSTD_COMPRESS_LEVEL: 3
      FAST_CONNECT_TIMEOUT: 5

    steps:
      - name: 1-系统初始化+全域深度清理（极速版）
        if: ${{ always() }}
        run: |
          set +e
          echo "===== [日志] 1-系统初始化+深度清理 开始 ====="
          
          sudo apt update -y -qq
          sudo apt install -y --no-install-recommends curl wget jq tar gzip lsof ca-certificates gnupg sshpass openssh-server zstd -qq
          
          sudo rm -rf /usr/local/lib /usr/local/.ghcup /usr/local/julia* /usr/local/aws-* /usr/local/n \
                      /opt/hostedtoolcache /opt/actionarchivecache /opt/runner-cache /opt/microsoft /opt/google \
                      /tmp/* /var/tmp/* ~/.cache/* /root/.cache/* /var/cache/apt/* 2>/dev/null
          
          sudo DEBIAN_FRONTEND=noninteractive apt autoremove --purge -y 2>/dev/null
          sudo DEBIAN_FRONTEND=noninteractive apt clean 2>/dev/null
          
          sudo systemctl enable --now ssh
          echo "✅ [日志] 1-完成 (极速模式)"
          echo "===== [日志] 1-步骤结束 =====\n"
      
      - name: 2-官方纯净安装 Docker
        if: ${{ always() }}
        run: |
          set +e
          echo "===== [日志] 2-安装 Docker 开始 ====="
          export DEBIAN_FRONTEND=noninteractive
          
          curl -fsSL https://get.docker.com | sudo bash
          
          sudo systemctl enable docker containerd
          sudo systemctl stop docker containerd 2>/dev/null
          
          sudo usermod -aG docker runner
          echo "✅ [日志] 2-Docker 安装完成"
          echo "===== [日志] 2-步骤结束 =====\n"
      
      - name: 3-官方纯净安装 CasaOS
        if: ${{ always() }}
        run: |
          set +e
          echo "===== [日志] 3-安装 CasaOS 开始 ====="
          curl -fsSL https://get.casaos.io | sudo bash
          sudo systemctl stop casaos 2>/dev/null
          sudo systemctl disable casaos 2>/dev/null
          echo "✅ [日志] 3-CasaOS 安装完成"
          echo "===== [日志] 3-步骤结束 =====\n"
      
      - name: 4-配置 root 管理员+SSH密码登录
        if: ${{ always() }}
        run: |
          set +e
          echo "===== [日志] 4-配置 root 管理员用户 开始 ====="
          if [ -z "$SSH_PASS" ]; then
            echo "❌ [日志] 错误：ROOT_PASSWORD 未配置，退出本步骤"
            exit 0
          fi
          
          # root用户系统默认存在，直接修改密码，无需新建
          echo "root:$SSH_PASS" | sudo chpasswd
          
          # 将root加入docker用户组，免sudo操作docker
          sudo usermod -aG docker root
          
          # 强制开启SSH root密码登录，覆盖系统默认限制
          sudo sed -i -e 's/^#PermitRootLogin.*/PermitRootLogin yes/' \
                      -e 's/^PermitRootLogin.*/PermitRootLogin yes/' \
                      -e 's/^#PasswordAuthentication.*/PasswordAuthentication yes/' \
                      -e 's/^PasswordAuthentication.*/PasswordAuthentication yes/' \
                      /etc/ssh/sshd_config 2>/dev/null
          
          sudo systemctl restart ssh
          echo "✅ [日志] 4-root管理员 & SSH 配置完成"
          echo "===== [日志] 4-步骤结束 =====\n"
      
      - name: 5-Tailscale 组网+上线
        if: ${{ always() }}
        run: |
          set +e
          echo "===== [日志] 5-Tailscale组网 开始 ====="
          if [ -z "$TAILSCALE_AUTH_KEY" ]; then
            echo "⚠️ [日志] Tailscale 未配置，跳过组网"
            exit 0
          fi
          
          curl -fsSL https://tailscale.com/install.sh | sudo bash
          sudo systemctl enable --now tailscaled
          sleep 2
          
          TS_HOSTNAME="CasaOS-$((RANDOM % 1000))"
          echo "[日志] 本次 Tailscale 主机名：${TS_HOSTNAME}"
          sudo tailscale up --authkey="$TAILSCALE_AUTH_KEY" --hostname="$TS_HOSTNAME" --accept-routes --reset
          
          echo -e "\n[日志] === 🖥️ 本机 IP 信息 ==="
          LOCAL_IP=$(hostname -I | awk '{print $1}')
          TAILSCALE_IP=$(sudo tailscale ip -4 2>/dev/null || echo "获取失败")
          echo "[日志] 物理内网IP: $LOCAL_IP"
          echo "[日志] Tailscale内网IP: $TAILSCALE_IP"
          echo "===================================\n"
          
          echo "✅ [日志] 5-Tailscale 组网上线完成"
          echo "===== [日志] 5-步骤结束 =====\n"
      
      - name: 6-从内网/aaa拉备份→多节点逐个尝试→删远程→本地恢复
        if: ${{ always() }}
        run: |
          set +e
          echo "===== [日志] 6-多节点尝试拉取备份（拉取即删） 开始 ====="
          if [ -z "$TAILSCALE_AUTH_KEY" ] || [ -z "$SSH_PASS" ]; then
            echo "ℹ️ [日志] 未配置 Tailscale/SSH，纯净启动"
            exit 0
          fi
          
          TS_STATUS_JSON=$(sudo tailscale status --json || true)
          SELF_ID=$(echo "$TS_STATUS_JSON" | jq -r '.Self.ID' || true)
          SELF_HOSTNAME=$(echo "$TS_STATUS_JSON" | jq -r '.Self.HostName' || true)
          echo "[日志] 本机 Tailscale ID: $SELF_ID"
          echo "[日志] 本机 Tailscale 主机名: $SELF_HOSTNAME"
          
          TARGET_LIST=$(echo "$TS_STATUS_JSON" | jq -r --arg self "$SELF_ID" '
            .Peer[] |
            select(.Online == true) |
            select(.ID != $self) |
            select( (.HostName | tostring | ascii_downcase) | contains("casaos") ) |
            "\(.HostName // "unknown")|\(.TailscaleIPs[0] // "no-ip")"
          ' || true)
          
          if [ -z "$TARGET_LIST" ]; then
            echo "ℹ️ [日志] 未找到符合条件节点，纯净启动"
            exit 0
          fi
          
          echo -e "\n[日志] 符合条件节点："
          echo "$TARGET_LIST" | while IFS='|' read -r h ip; do
            echo "  - 设备：$h ｜ IP：$ip"
          done
          
          echo -e "\n[日志] 停止 Docker/CasaOS 以安全恢复..."
          sudo systemctl stop docker containerd casaos 2>/dev/null || true
          sudo pkill -9 "casaos" "docker" "containerd" 2>/dev/null || true
          sudo rm -f /var/run/docker.pid /var/run/docker.sock.lock /var/run/containerd.pid 2>/dev/null || true
          sync && sleep 2 || true
          
          sudo mkdir -p "$LOCAL_BACKUP_DIR" || true
          sudo chmod 777 "$LOCAL_BACKUP_DIR" || true
          RESTORE_SUCCESS=0
          
          SSH_OPTS="-o StrictHostKeyChecking=no -o ConnectTimeout=$FAST_CONNECT_TIMEOUT -o UserKnownHostsFile=/dev/null"
          
          while IFS='|' read -r TARGET_HOST TARGET_IP; do
            echo -e "\n==========================================================="
            echo "[日志] 🎯 尝试节点：$TARGET_HOST | $TARGET_IP"
            echo "==========================================================="
            
            LATEST_FILE=""
            for ((i=1; i<=RETRY_TIMES; i++)); do
              LATEST_FILE=$(sshpass -p "$SSH_PASS" ssh $SSH_OPTS "$SSH_USER@$TARGET_IP" "ls -t \"$REMOTE_BACKUP_BASE\"/casaos-*.tar.zst 2>/dev/null | head -1" || true)
              [ -n "$LATEST_FILE" ] && break
              sleep 1
            done
            
            if [ -z "$LATEST_FILE" ]; then
              echo "[日志] ⚠️ 无备份，跳过"
              continue
            fi
            
            LOCAL_FILE="$LOCAL_BACKUP_DIR/$(basename "$LATEST_FILE")"
            pull_success=0
            
            for ((i=1; i<=RETRY_TIMES; i++)); do
              if sudo sshpass -p "$SSH_PASS" scp $SSH_OPTS "$SSH_USER@$TARGET_IP:$LATEST_FILE" "$LOCAL_FILE"; then
                pull_success=1
                break
              fi
              sleep 1
            done
            
            if [ $pull_success -ne 1 ] || [ ! -s "$LOCAL_FILE" ]; then
              echo "[日志] ⚠️ 拉取失败/文件无效"
              rm -f "$LOCAL_FILE" 2>/dev/null || true
              continue
            fi
            
            echo -e "\n[日志] 🗑️ 拉取成功，执行拉取即删：删除远程文件"
            sshpass -p "$SSH_PASS" ssh $SSH_OPTS "$SSH_USER@$TARGET_IP" "sudo rm -f '$LATEST_FILE'" || echo "[日志] ⚠️ 远程删除失败，继续恢复"
            
            echo -e "\n[日志] 🔧 开始解压恢复"
            sudo tar --zstd -xf "$LOCAL_FILE" -C / --overwrite --preserve-permissions || true
            
            echo "[日志] 修复目录权限..."
            for dir in $PERSONAL_DATA_DIRS; do
              [ -d "$dir" ] && sudo chown -R root:root "$dir" || true
            done
            [ -d "/etc/casaos" ]     && sudo chmod -R 755 /etc/casaos || true
            [ -d "/DATA" ]           && sudo chmod -R 755 /DATA || true
            [ -d "/var/lib/casaos" ] && sudo chmod -R 700 /var/lib/casaos || true
            [ -d "/var/lib/docker" ] && sudo chmod -R 700 /var/lib/docker || true
            
            echo -e "\n[日志] 🎉 节点 $TARGET_HOST 恢复成功！"
            RESTORE_SUCCESS=1
            break
          done < <(echo "$TARGET_LIST")
          
          if [ $RESTORE_SUCCESS -ne 1 ]; then
            echo -e "\n[日志] ❌ 所有节点均失败，纯净启动"
            exit 0
          fi
          
          echo -e "\n✅ [日志] 6-恢复流程完成"
          echo "===== [日志] 6-步骤结束 =====\n"
      
      - name: 7-启动 Docker & CasaOS (极速就绪检测)
        if: ${{ always() }}
        run: |
          set +e
          echo "===== [日志] 7-启动 Docker & CasaOS 开始 ====="
          sudo fuser -k 80/tcp 443/tcp 2>/dev/null || true
          sudo mkdir -p /run/docker 2>/dev/null || true
          sudo systemctl daemon-reload || true
          
          echo "[日志] 启动 Docker..."
          sudo systemctl enable --now docker containerd
          
          # 极速就绪检测，替代固定sleep
          while ! docker info > /dev/null 2>&1; do
            echo -n "."
            sleep 1
          done
          echo "Docker 服务就绪"
          
          echo "[日志] 启动 CasaOS..."
          sudo systemctl enable --now casaos
          
          while ! lsof -i :80 > /dev/null 2>&1; do
            echo -n "."
            sleep 1
          done
          echo "CasaOS 服务就绪"
          
          echo "✅ [日志] 7-Docker & CasaOS 启动完成"
          echo "===== [日志] 7-步骤结束 =====\n"
      
      - name: 8-稳定运行指定分钟
        if: ${{ always() }}
        run: |
          echo "===== [日志] 8-稳定运行 $TARGET_RUN_MINUTES 分钟 开始 ====="
          RUN_SECONDS=$((TARGET_RUN_MINUTES * 60))
          echo "[日志] 总等待秒数：$RUN_SECONDS"
          sleep $RUN_SECONDS || true
          echo "✅ [日志] 8-稳定运行完成"
          echo "===== [日志] 8-步骤结束 =====\n"
      
      - name: 9-停止业务服务（安全备份，保留Tailscale在线）
        if: ${{ always() }}
        run: |
          set +e
          echo "===== [日志] 9-停止业务服务（保留Tailscale） 开始 ====="
          sudo systemctl stop casaos docker containerd 2>/dev/null || true
          sudo pkill -9 "casaos" "docker" "containerd" 2>/dev/null || true
          sudo rm -f /var/run/docker.pid /var/run/docker.sock.lock /var/run/containerd.pid 2>/dev/null || true
          sudo umount /var/lib/docker/overlay2/*/merged 2>/dev/null || true
          sync && sleep 3 || true
          echo "✅ [日志] 9-业务服务已停止"
          echo "===== [日志] 9-步骤结束 =====\n"
      
      - name: 10-本地全量备份（极速压缩）
        if: ${{ always() }}
        run: |
          set +e
          echo "===== [日志] 10-生成本地全量备份 开始 ====="
          sudo mkdir -p "$LOCAL_BACKUP_DIR" || true
          IFS=' ' read -r -a DIR_ARRAY <<< "$PERSONAL_DATA_DIRS"
          for dir in "${DIR_ARRAY[@]}"; do
            [ ! -d "$dir" ] && sudo mkdir -p "$dir" || true
          done
          
          SNAP_NAME="casaos-full-$(date +%Y%m%d-%H%M%S).tar.zst"
          LOCAL_FILE="$LOCAL_BACKUP_DIR/$SNAP_NAME"
          echo "[日志] 备份文件：$SNAP_NAME"
          
          # 多线程极速压缩
          sudo tar -I "zstd -$ZSTD_COMPRESS_LEVEL --threads=0" -cf "$LOCAL_FILE" \
            --ignore-failed-read --preserve-permissions \
            "${DIR_ARRAY[@]}" || true
          
          if [ -f "$LOCAL_FILE" ] && [ -s "$LOCAL_FILE" ]; then
            echo "[日志] ✅ 备份有效"
            echo "BACKUP_FILE=$LOCAL_FILE" >> $GITHUB_ENV || true
            echo "SNAP_NAME=$SNAP_NAME" >> $GITHUB_ENV || true
          else
            echo "[日志] ❌ 备份文件无效"
            exit 0
          fi
          echo "✅ [日志] 10-备份完成"
          echo "===== [日志] 10-步骤结束 =====\n"
      
      - name: 11-触发下一轮续跑【带校验+失败重发】确保一定成功
        if: ${{ always() }}
        run: |
          set +e
          echo "===== [日志] 11-带自动校验的续跑触发 开始 ====="
          if [ -z "$USER_PAT" ] || [ -z "$REPO" ]; then
            echo "⚠️ [日志] 未配置 PAT/REPO，跳过"
            exit 0
          fi
          
          RETRY_DISPATCH_TIMES=3
          DISPATCH_WAIT_SECONDS=5
          WORKFLOW_NAME="CasaOS纯净部署（Tailscale内网版 /aaa目录 拉取即删 无限检测删除）"
          DISPATCH_SUCCESS=0
          
          for ((retry=1; retry<=RETRY_DISPATCH_TIMES; retry++)); do
            echo -e "\n[日志] 第 $retry 次触发续跑..."
            curl -s -f -X POST \
              -H "Authorization: token $USER_PAT" \
              -H "Content-Type: application/json" \
              https://api.github.com/repos/$REPO/dispatches \
              -d '{"event_type":"renew_casaos_snapshot"}' >/dev/null 2>&1 || true
            
            sleep $DISPATCH_WAIT_SECONDS || true
            echo "[日志] 校验是否已有任务在排队/运行..."
            
            WF_ID=$(curl -s -H "Authorization: token $USER_PAT" \
              "https://api.github.com/repos/$REPO/actions/workflows?per_page=15" \
              | jq -r --arg name "$WORKFLOW_NAME" '
                .workflows[] | select(.name == $name) | .id
              ' | head -1 || true)
            
            if [ -n "$WF_ID" ]; then
              RUN_STATUS=$(curl -s -H "Authorization: token $USER_PAT" \
                "https://api.github.com/repos/$REPO/actions/workflows/$WF_ID/runs?per_page=5" \
                | jq -r '
                  .workflow_runs[] | select(.status == "queued" or .status == "in_progress") | .status
                ' | head -1 || true)
              
              if [ "$RUN_STATUS" = "queued" ] || [ "$RUN_STATUS" = "in_progress" ]; then
                echo "✅ [日志] 续跑校验成功！当前任务状态：$RUN_STATUS"
                DISPATCH_SUCCESS=1
                break
              fi
            fi
            echo "[日志] 第 $retry 次未检测到有效任务，${DISPATCH_WAIT_SECONDS}秒后重试..."
          done
          
          if [ $DISPATCH_SUCCESS -eq 1 ]; then
            echo "🎉 [日志] 续跑最终确认成功！"
          else
            echo "❌ [日志] 重试 $RETRY_DISPATCH_TIMES 次仍未成功"
          fi
          echo "===== [日志] 11-步骤结束 =====\n"
      
      - name: 12-移入/aaa并无限轮询检测删除（1分钟/次 无上限）
        if: ${{ always() }}
        run: |
          set +e
          echo "===== [日志] 12-备份移入/aaa + 无限轮询删除 开始 ====="
          if [ -z "$BACKUP_FILE" ] || [ -z "$SNAP_NAME" ]; then
            echo "ℹ️ [日志] 无备份文件，跳过"
            exit 0
          fi
          
          LOCAL_AAA="/aaa"
          sudo mkdir -p "$LOCAL_AAA" || true
          TARGET_FILE="$LOCAL_AAA/$SNAP_NAME"
          sudo mv -v "$BACKUP_FILE" "$TARGET_FILE" || true
          
          echo -e "\n[日志] ⌛ 无限轮询：文件被删除即退出，进入下一轮"
          while true; do
            if [ ! -f "$TARGET_FILE" ]; then
              echo "[日志] 🎉 文件已被拉取删除，退出轮询"
              break
            fi
            echo "[日志] 文件正常，1分钟后检查..."
            sleep 60 || true
          done
          
          echo "✅ [日志] 12-轮询结束"
          echo "===== [日志] 12-步骤结束 =====\n"
      
      - name: 13-最终清理+关闭Tailscale主网络
        if: ${{ always() }}
        run: |
          set +e
          echo "===== [日志] 13-最终清理 + 关闭Tailscale 开始 ====="
          sudo systemctl stop tailscaled 2>/dev/null || true
          sudo pkill -9 "tailscaled" 2>/dev/null || true
          sudo rm -rf "$LOCAL_BACKUP_DIR" /tmp/* 2>/dev/null || true
          sudo apt autoremove -y -qq && sudo apt clean -y -qq || true
          sudo rm -rf /var/cache/apt/* 2>/dev/null || true
          
          # 还原SSH root登录默认配置（可选，如需保留可注释）
          sudo sed -i 's/^PermitRootLogin yes/PermitRootLogin prohibit-password/' /etc/ssh/sshd_config 2>/dev/null || true
          
          echo "✅ [日志] 13-清理完成，Tailscale 已关闭"
          echo "🎉 [日志] 全流程正常结束"
          echo "===== [日志] 13-步骤结束 =====\n"