name: CasaOS纯净部署（单服务器全并行-最终逻辑修正版）

on:
  workflow_dispatch:
  repository_dispatch:
    types: [renew_casaos_snapshot]

env:
  RETRY_TIMES: 3
  ZSTD_COMPRESS_LEVEL: 3
  POLL_INTERVAL: 60
  TARGET_RUN_MINUTES: 10
  PERSONAL_DATA_DIRS: "/var/lib/docker /etc/casaos /var/lib/casaos /DATA"
  REMOTE_BACKUP_BASE: "/aaa"
  LOCAL_BACKUP_DIR: "/tmp/casaos-backup"
  LOCAL_AAA_DIR: "/aaa"
  SSH_USER: "root"
  LOG_PREFIX: "[日志]"

jobs:
  casaos-deploy:
    runs-on: ubuntu-24.04
    timeout-minutes: 480
    env:
      ROOTS_PASSWORD: ${{ secrets.ROOTS_PASSWORD }}
      USER_PAT: ${{ secrets.USER_PAT }}
      REPO: ${{ secrets.REPO }}
      TAILSCALE_AUTH_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
      SSH_PASS: ${{ secrets.ROOTS_PASSWORD }}

    steps:
      # ============================================================
      # 顺序保证：先串行初始化(独占APT) → 并行4任务(无冲突)
      # ============================================================
      - name: 系统初始化 + 并行安装(Docker/CasaOS/管理员/Tailscale)
        run: |
          # 1. 系统初始化（必须先跑，解决APT锁）
          task_init() {
            echo "$LOG_PREFIX 系统初始化开始"
            sudo apt update -y -qq || true
            sudo apt install -y curl wget jq tar gzip lsof ca-certificates gnupg sshpass openssh-server zstd -qq || true
            sudo rm -rf /usr/local/lib /usr/local/.ghcup /usr/local/julia* /usr/local/aws-* /usr/local/n /opt/* /tmp/* /var/tmp/* ~/.cache /root/.cache /var/cache/apt/* || true
            sudo DEBIAN_FRONTEND=noninteractive apt autoremove --purge -y || true
            sudo DEBIAN_FRONTEND=noninteractive apt clean || true
            echo "$LOG_PREFIX 系统初始化完成"
          }

          # 2. 安装 Docker
          task_docker() {
            echo "$LOG_PREFIX 安装Docker开始"
            export DEBIAN_FRONTEND=noninteractive
            for i in 1 2 3; do
              curl -fsSL https://get.docker.com | sudo bash && break || sleep 3
            done
            sudo systemctl enable docker containerd || true
            sudo systemctl stop docker containerd || true
            echo "$LOG_PREFIX Docker安装完成"
          }

          # 3. 安装 CasaOS（重试+校验）
          task_casaos() {
            echo "$LOG_PREFIX 安装CasaOS开始"
            for i in 1 2 3; do
              curl -fsSL https://get.casaos.io | sudo bash && break || sleep 5
            done
            sudo systemctl stop casaos || true
            sudo systemctl disable casaos || true
            if ! command -v casaos &>/dev/null; then
              echo "$LOG_PREFIX CasaOS安装失败"
              exit 1
            fi
            echo "$LOG_PREFIX CasaOS安装成功"
          }

          # 4. 管理员+SSH
          task_admin() {
            echo "$LOG_PREFIX 配置管理员开始"
            if [ -n "$SSH_PASS" ]; then
              id -u "$SSH_USER" &>/dev/null || sudo useradd -m -s /bin/bash "$SSH_USER"
              echo "$SSH_USER:$SSH_PASS" | sudo chpasswd
              echo "$SSH_USER ALL=(ALL) NOPASSWD: ALL" | sudo tee /etc/sudoers.d/$SSH_USER >/dev/null
              sudo chmod 0440 /etc/sudoers.d/$SSH_USER
              sudo usermod -aG docker $SSH_USER
              sudo sed -i 's/^#*PermitRootLogin.*/PermitRootLogin yes/' /etc/ssh/sshd_config
              sudo sed -i 's/^#*PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config
              sudo systemctl restart ssh
            fi
            echo "$LOG_PREFIX 管理员配置完成"
          }

          # 5. Tailscale 组网
          task_tailscale() {
            echo "$LOG_PREFIX Tailscale组网开始"
            if [ -n "$TAILSCALE_AUTH_KEY" ]; then
              for i in 1 2 3; do
                curl -fsSL https://tailscale.com/install.sh | sudo bash && break || sleep 2
              done
              sudo systemctl enable --now tailscaled
              sleep 2
              sudo tailscale up --authkey="$TAILSCALE_AUTH_KEY" --hostname="CasaOS-$((RANDOM%1000))" --accept-routes --reset --accept-dns=false
            fi
            echo "$LOG_PREFIX Tailscale组网完成"
          }

          # 执行
          task_init
          task_docker &
          task_casaos &
          task_admin &
          task_tailscale &
          wait
          echo "$LOG_PREFIX 所有初始化/安装任务完成"

      # ============================================================
      # Step 6：拉取备份恢复（依赖Tailscale+SSH，必须串行）
      # ============================================================
      - name: 拉取备份恢复
        run: |
          echo "$LOG_PREFIX 开始拉取备份恢复"
          if [ -z "$TAILSCALE_AUTH_KEY" ] || [ -z "$SSH_PASS" ]; then
            echo "$LOG_PREFIX 未配置组网/SSH，使用纯净启动"
            exit 0
          fi

          sleep 5
          TS_STATUS=$(sudo tailscale status --json 2>/dev/null || echo '{"Peer":[]}')
          SELF_ID=$(echo "$TS_STATUS" | jq -r '.Self.ID // empty')

          TARGET_LIST=$(echo "$TS_STATUS" | jq -r --arg self "$SELF_ID" '
            .Peer[] | select(.Online==true and .ID!=$self) | select(.HostName|test("casaos";"i")) |
            "\(.HostName)//\(.TailscaleIPs[0])"
          ' 2>/dev/null | head -5)

          if [ -z "$TARGET_LIST" ]; then
            echo "$LOG_PREFIX 未找到在线节点，纯净启动"
            exit 0
          fi

          sudo fuser -k 80/tcp 443/tcp 2>/dev/null || true
          sudo systemctl stop docker containerd casaos 2>/dev/null || true
          sudo pkill -9 -f "casaos|docker" 2>/dev/null || true
          sync && sleep 2

          echo "$TARGET_LIST" | while IFS='/' read -r HOST IP; do
            [ -z "$IP" ] && continue
            LATEST=$(sshpass -p "$SSH_PASS" ssh -o ConnectTimeout=5 -o StrictHostKeyChecking=no "$SSH_USER@$IP" "ls -t $REMOTE_BACKUP_BASE/casaos-*.tar.zst 2>/dev/null | head -1")
            [ -z "$LATEST" ] && continue

            LOCAL_FILE="$LOCAL_BACKUP_DIR/$(basename $LATEST)"
            sudo mkdir -p "$LOCAL_BACKUP_DIR"
            if sshpass -p "$SSH_PASS" scp -o ConnectTimeout=15 "$SSH_USER@$IP:$LATEST" "$LOCAL_FILE"; then
              sshpass -p "$SSH_PASS" ssh -o ConnectTimeout=5 "$SSH_USER@$IP" "sudo rm -f $LATEST"
              sudo tar --zstd -xf "$LOCAL_FILE" -C / --overwrite 2>/dev/null || true
              sudo rm -f "$LOCAL_FILE"
              echo "$LOG_PREFIX 从 $HOST 恢复备份成功"
              break
            fi
          done

          echo "$LOG_PREFIX 备份恢复流程结束"

      # ============================================================
      # Step 7：启动服务（正确顺序：containerd → docker → casaos）
      # ============================================================
      - name: 启动服务
        run: |
          echo "$LOG_PREFIX 启动服务"
          sudo fuser -k 80/tcp 443/tcp 2>/dev/null || true
          sudo mkdir -p /run/docker
          sudo systemctl daemon-reload
          sudo systemctl enable --now containerd
          sleep 3
          sudo systemctl enable --now docker
          sleep 5
          sudo systemctl enable --now casaos
          echo "$LOG_PREFIX Docker: $(systemctl is-active docker 2>/dev/null)"
          echo "$LOG_PREFIX CasaOS: $(systemctl is-active casaos 2>/dev/null)"

      # ============================================================
      # Step 8：稳定运行 10 分钟
      # ============================================================
      - name: 稳定运行10分钟
        timeout-minutes: 360
        run: |
          echo "$LOG_PREFIX 开始稳定运行 10 分钟"
          RUN_SECONDS=$(600)
          ELAPSED=0
          while [ $ELAPSED -lt $RUN_SECONDS ]; do
            MIN=$((ELAPSED/60))
            echo "$LOG_PREFIX 已运行 $MIN / 10 分钟"
            sleep 60
            ELAPSED=$((ELAPSED+60))
          done

      # ============================================================
      # Step 9：停止服务
      # ============================================================
      - name: 停止服务
        run: |
          sudo systemctl stop casaos
          sudo systemctl stop docker containerd
          sudo pkill -9 -f "casaos|docker" 2>/dev/null || true

      # ============================================================
      # Step 10：本地备份（必须成功并导出变量）
      # ============================================================
      - name: 本地备份
        run: |
          echo "$LOG_PREFIX 开始本地备份"
          sudo mkdir -p "$LOCAL_BACKUP_DIR"
          SNAP_NAME="casaos-full-$(date +%Y%m%d-%H%M%S).tar.zst"
          LOCAL_FILE="$LOCAL_BACKUP_DIR/$SNAP_NAME"

          sudo tar -I"zstd -$ZSTD_COMPRESS_LEVEL -T0" -cf "$LOCAL_FILE" --ignore-failed-read --preserve-permissions $PERSONAL_DATA_DIRS 2>/dev/null || true

          if [ -f "$LOCAL_FILE" ] && [ -s "$LOCAL_FILE" ]; then
            echo "$LOG_PREFIX 备份成功: $SNAP_NAME"
            echo "BACKUP_FILE=$LOCAL_FILE" | sudo tee -a $GITHUB_ENV >/dev/null
            echo "SNAP_NAME=$SNAP_NAME" | sudo tee -a $GITHUB_ENV >/dev/null
          else
            echo "$LOG_PREFIX 备份文件为空或失败"
            echo "BACK_FILE_MISSING=1" | sudo tee -a $GITHUB_ENV >/dev/null
          fi

      # ============================================================
      # Step 11：触发下一轮
      # ============================================================
      - name: 触发下一轮工作流
        run: |
          if [ -n "$USER_PAT" ] && [ -n "$REPO" ]; then
            for r in 1 2 3; do
              curl -s -f -X POST -H "Authorization: token $USER_PAT" \
                https://api.github.com/repos/$REPO/dispatches \
                -d '{"event_type":"renew_casaos_snapshot"}' && break
              sleep 2
            done
          fi

      # ============================================================
      # Step 12：轮询等待文件删除（逻辑完全修复）
      # ============================================================
      - name: 轮询等待备份文件被删除
        timeout-minutes: 1440
        run: |
          echo "$LOG_PREFIX 进入文件轮询等待"
          if [ -n "$BACK_FILE_MISSING" ] || [ -z "$BACKUP_FILE" ] || [ -z "$SNAP_NAME" ]; then
            echo "$LOG_PREFIX 无有效备份文件，等待10秒后结束（避免瞬间结束）"
            sleep 10
            exit 0
          fi

          sudo mkdir -p "$LOCAL_AAA_DIR"
          TARGET_FILE="$LOCAL_AAA_DIR/$SNAP_NAME"
          sudo mv -v "$BACKUP_FILE" "$TARGET_FILE" || true

          if [ ! -f "$TARGET_FILE" ]; then
            echo "$LOG_PREFIX 文件不存在，退出"
            sleep 10
            exit 0
          fi

          echo "$LOG_PREFIX 等待文件被删除: $TARGET_FILE"
          POLL=0
          while [ -f "$TARGET_FILE" ]; do
            echo "$LOG_PREFIX 等待中... 轮询次数: $POLL"
            sleep $POLL_INTERVAL
            POLL=$((POLL+1))
          done

          echo "$LOG_PREFIX 文件已被删除，流程继续"

      # ============================================================
      # Step 13：最终清理
      # ============================================================
      - name: 最终清理
        run: |
          sudo systemctl stop tailscaled 2>/dev/null || true
          sudo rm -rf "$LOCAL_BACKUP_DIR" "$LOCAL_AAA_DIR" /tmp/*
          sudo rm -f /etc/sudoers.d/$SSH_USER
          sudo apt autoremove -y && sudo apt clean
          echo "$LOG_PREFIX 全部流程正常结束"