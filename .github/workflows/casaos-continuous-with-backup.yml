name: CasaOS纯净部署（Tailscale内网版 /aaa目录 拉取即删 无限检测删除）
on:
  workflow_dispatch:
  repository_dispatch:
    types: [renew_casaos_snapshot]

jobs:
  casaos-deploy:
    runs-on: ubuntu-24.04
    timeout-minutes: 480
    env:
      PERSONAL_DATA_DIRS: "/var/lib/docker /etc/casaos /var/lib/casaos /DATA"
      ROOTS_PASSWORD: ${{ secrets.ROOTS_PASSWORD }}
      USER_PAT: ${{ secrets.USER_PAT }}
      REPO: ${{ secrets.REPO }}
      TAILSCALE_AUTH_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
      SSH_USER: "roots"
      SSH_PASS: ${{ secrets.ROOTS_PASSWORD }}
      REMOTE_BACKUP_BASE: "/aaa"
      LOCAL_BACKUP_DIR: "/tmp/casaos-backup"
      TARGET_RUN_MINUTES: 300
      RETRY_TIMES: 3
      ZSTD_COMPRESS_LEVEL: 8

    steps:
      - name: 1-系统初始化+全域深度清理（无Docker/CasaOS卸载）
        if: ${{ always() }}
        run: |
          set +e
          echo "===== [日志] 1-系统初始化+全域深度清理 开始 ====="
          sudo apt update -y -qq 2>/dev/null || true
          sudo apt install -y curl wget jq tar gzip lsof ca-certificates gnupg sshpass openssh-server zstd -qq 2>/dev/null || true
          sudo rm -rf /usr/local/lib /usr/local/.ghcup /usr/local/julia* /usr/local/aws-* /usr/local/n 2>/dev/null || true
          sudo rm -rf /opt/hostedtoolcache /opt/actionarchivecache /opt/runner-cache /opt/microsoft /opt/google 2>/dev/null || true
          sudo DEBIAN_FRONTEND=noninteractive apt autoremove --purge -y 2>/dev/null || true
          sudo DEBIAN_FRONTEND=noninteractive apt clean 2>/dev/null || true
          sudo rm -rf /tmp/* /var/tmp/* ~/.cache/* /root/.cache/* /var/cache/apt/* 2>/dev/null || true
          sync && sudo sysctl -w vm.drop_caches=3 2>/dev/null || true
          sudo systemctl enable --now ssh 2>/dev/null || true
          echo "✅ [日志] 1-系统初始化+深度清理完成"
          echo "===== [日志] 1-步骤结束 =====\n"

      - name: 2-官方纯净安装 Docker
        if: ${{ always() }}
        run: |
          set +e
          echo "===== [日志] 2-安装 Docker（官方源） 开始 ====="
          export DEBIAN_FRONTEND=noninteractive
          curl -fsSL https://get.docker.com | sudo bash 2>/dev/null || true
          sudo systemctl enable docker containerd 2>/dev/null || true
          sudo systemctl stop docker containerd 2>/dev/null || true
          docker --version 2>/dev/null || true
          sudo usermod -aG docker runner 2>/dev/null || true
          echo "✅ [日志] 2-Docker 安装完成"
          echo "===== [日志] 2-步骤结束 =====\n"

      - name: 3-官方纯净安装 CasaOS
        if: ${{ always() }}
        run: |
          set +e
          echo "===== [日志] 3-安装 CasaOS 开始 ====="
          curl -fsSL https://get.casaos.io | sudo bash 2>/dev/null || true
          sudo systemctl stop casaos 2>/dev/null || true
          sudo systemctl disable casaos 2>/dev/null || true
          echo "✅ [日志] 3-CasaOS 安装完成"
          echo "===== [日志] 3-步骤结束 =====\n"

      - name: 4-创建 roots 管理员+SSH密码登录+SSH公钥（零报错版）
        if: ${{ always() }}
        run: |
          set +e
          echo "===== [日志] 4-配置管理员用户 roots 开始 ====="
          [ -z "$SSH_PASS" ] && echo "⚠️ SSH_PASS 未配置，跳过用户创建" || true
          USER_NAME="roots"
          id -u "$USER_NAME" &>/dev/null || sudo useradd -m -s /bin/bash "$USER_NAME" 2>/dev/null || true
          echo "$USER_NAME:$SSH_PASS" | sudo chpasswd 2>/dev/null || true
          echo "$USER_NAME ALL=(ALL) NOPASSWD: ALL" | sudo tee /etc/sudoers.d/"$USER_NAME" >/dev/null 2>/dev/null || true
          sudo chmod 0440 /etc/sudoers.d/"$USER_NAME" 2>/dev/null || true
          sudo usermod -aG docker "$USER_NAME" 2>/dev/null || true
          sudo sed -i 's/^#PermitRootLogin.*/PermitRootLogin yes/' /etc/ssh/sshd_config 2>/dev/null || true
          sudo sed -i 's/^#PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config 2>/dev/null || true

          # ========== 你要的 SSH 公钥（绝对不报错、不卡住）==========
          sudo mkdir -p /home/roots/.ssh 2>/dev/null || true
          echo 'ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIKdCy8ixXko/FbqQfjXqoTNz25+gHM9CxWHHrcZ9z/eM openclaw@container->host' \
          | sudo tee /home/roots/.ssh/authorized_keys >/dev/null 2>/dev/null || true
          sudo chmod 700 /home/roots/.ssh 2>/dev/null || true
          sudo chmod 600 /home/roots/.ssh/authorized_keys 2>/dev/null || true
          sudo chown -R roots:roots /home/roots/.ssh 2>/dev/null || true
          echo "✅ SSH公钥配置完成（无论成功失败都不中断）"

          sudo systemctl restart ssh 2>/dev/null || true
          echo "✅ [日志] 4-管理员用户 & SSH 配置完成"
          echo "===== [日志] 4-步骤结束 =====\n"

      - name: 5-Tailscale 组网+上线+显示本机IP地址（官方一键安装）
        if: ${{ always() }}
        run: |
          set +e
          echo "===== [日志] 5-Tailscale组网 + 显示本机信息 开始 ====="
          [ -z "$TAILSCALE_AUTH_KEY" ] && echo "⚠️ Tailscale 未配置，跳过组网" || true
          curl -fsSL https://tailscale.com/install.sh | sudo bash 2>/dev/null || true
          sudo systemctl enable --now tailscaled && sleep 2 2>/dev/null || true
          TS_SUFFIX=$((RANDOM % 1000)) 2>/dev/null || true
          TS_HOSTNAME="CasaOS-${TS_SUFFIX}" 2>/dev/null || true
          echo "[日志] 本次 Tailscale 主机名：${TS_HOSTNAME}"
          sudo tailscale up --authkey="$TAILSCALE_AUTH_KEY" --hostname="$TS_HOSTNAME" --accept-routes --reset 2>/dev/null || true
          echo -e "\n[日志] === 🖥️ 本机 IP 信息 ==="
          LOCAL_IP=$(hostname -I | awk '{print $1}' 2>/dev/null || echo "获取失败")
          TAILSCALE_IP=$(sudo tailscale ip -4 2>/dev/null || echo "获取失败")
          echo "[日志] 物理内网IP: $LOCAL_IP"
          echo "[日志] Tailscale内网IP: $TAILSCALE_IP"
          echo "===================================\n"
          echo "✅ [日志] 5-Tailscale 组网上线完成"
          echo "===== [日志] 5-步骤结束 =====\n"

      - name: 6-从内网/aaa拉备份→多节点逐个尝试→删远程→本地恢复
        if: ${{ always() }}
        run: |
          set +e
          echo "===== [日志] 6-多节点尝试拉取备份（拉取即删） 开始 ====="
          [ -z "$TAILSCALE_AUTH_KEY" ] || [ -z "$SSH_PASS" ] && echo "ℹ️ 未配置 Tailscale/SSH，纯净启动" || true
          TS_STATUS_JSON=$(sudo tailscale status --json 2>/dev/null || echo "{}")
          SELF_ID=$(echo "$TS_STATUS_JSON" | jq -r '.Self.ID' 2>/dev/null || echo "")
          SELF_HOSTNAME=$(echo "$TS_STATUS_JSON" | jq -r '.Self.HostName' 2>/dev/null || echo "")
          echo "[日志] 本机 Tailscale ID: $SELF_ID"
          echo "[日志] 本机 Tailscale 主机名: $SELF_HOSTNAME"
          TARGET_LIST=$(echo "$TS_STATUS_JSON" | jq -r --arg self "$SELF_ID" '
            .Peer[] | select(.Online == true) | select(.ID != $self) | select( (.HostName | tostring | ascii_downcase) | contains("casaos") ) | "\(.HostName // "unknown")|\(.TailscaleIPs[0] // "no-ip")|\(.Online)"
          ' 2>/dev/null || echo "")
          [ -z "$TARGET_LIST" ] && echo "ℹ️ 未找到符合条件节点，纯净启动" || true
          echo -e "\n[日志] 符合条件节点："
          echo "$TARGET_LIST" | while IFS='|' read -r h ip online; do echo "  - 设备：$h ｜ IP：$ip ｜ 在线：$online"; done 2>/dev/null || true
          echo -e "\n[日志] 停止 Docker/CasaOS 以安全恢复..."
          sudo systemctl stop docker containerd casaos 2>/dev/null || true
          sudo pkill -9 "casaos" "docker" "containerd" 2>/dev/null || true
          sudo rm -f /var/run/docker.pid /var/run/docker.sock.lock /var/run/containerd.pid 2>/dev/null || true
          sync && sleep 3 2>/dev/null || true
          sudo mkdir -p "$LOCAL_BACKUP_DIR" 2>/dev/null || true
          sudo chmod 777 "$LOCAL_BACKUP_DIR" 2>/dev/null || true
          RESTORE_SUCCESS=0
          while IFS='|' read -r TARGET_HOST TARGET_IP TARGET_ONLINE; do
            echo -e "\n==========================================================="
            echo "[日志] 🎯 尝试节点：$TARGET_HOST | $TARGET_IP"
            echo "==========================================================="
            LATEST_FILE=""
            for ((i=1; i<=RETRY_TIMES; i++)); do
              LATEST_FILE=$(sshpass -p "$SSH_PASS" ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 "$SSH_USER@$TARGET_IP" "ls -t \"$REMOTE_BACKUP_BASE\"/casaos-*.tar.zst 2>/dev/null | head -1" 2>/dev/null || true)
              [ -n "$LATEST_FILE" ] && break
              sleep 3 2>/dev/null || true
            done
            [ -z "$LATEST_FILE" ] && echo "[日志] ⚠️ 无备份，跳过" && continue
            LOCAL_FILE="$LOCAL_BACKUP_DIR/$(basename "$LATEST_FILE")"
            pull_success=0
            for ((i=1; i<=RETRY_TIMES; i++)); do
              if sudo sshpass -p "$SSH_PASS" scp -o StrictHostKeyChecking=no -o ConnectTimeout=15 "$SSH_USER@$TARGET_IP:$LATEST_FILE" "$LOCAL_FILE" 2>/dev/null; then
                pull_success=1
                break
              fi
              sleep 3 2>/dev/null || true
            done
            [ $pull_success -ne 1 ] || [ ! -s "$LOCAL_FILE" ] && echo "[日志] ⚠️ 拉取失败/文件无效" && rm -f "$LOCAL_FILE" 2>/dev/null || true && continue
            echo -e "\n[日志] 🗑️ 拉取成功，执行拉取即删：删除远程文件"
            sshpass -p "$SSH_PASS" ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 "$SSH_USER@$TARGET_IP" "sudo rm -f '$LATEST_FILE'" 2>/dev/null || echo "[日志] ⚠️ 远程删除失败，继续恢复"
            echo -e "\n[日志] 🔧 开始解压恢复（zstd 最高压缩）"
            sudo tar --zstd -xf "$LOCAL_FILE" -C / --overwrite --preserve-permissions 2>/dev/null || true
            echo "[日志] 修复目录权限..."
            for dir in $PERSONAL_DATA_DIRS; do
              [ -d "$dir" ] && sudo chown -R root:root "$dir" 2>/dev/null || true
            done
            [ -d "/etc/casaos" ]     && sudo chmod -R 755 /etc/casaos 2>/dev/null || true
            [ -d "/DATA" ]           && sudo chmod -R 755 /DATA 2>/dev/null || true
            [ -d "/var/lib/casaos" ] && sudo chmod -R 700 /var/lib/casaos 2>/dev/null || true
            [ -d "/var/lib/docker" ] && sudo chmod -R 700 /var/lib/docker 2>/dev/null || true
            echo -e "\n[日志] 🎉 节点 $TARGET_HOST 恢复成功！"
            RESTORE_SUCCESS=1
            break
          done < <(echo "$TARGET_LIST") 2>/dev/null || true
          [ $RESTORE_SUCCESS -ne 1 ] && echo -e "\n[日志] ❌ 所有节点均失败，纯净启动" || true
          echo -e "\n✅ [日志] 6-恢复流程完成"
          echo "===== [日志] 6-步骤结束 =====\n"

      - name: 7-启动 Docker & CasaOS
        if: ${{ always() }}
        run: |
          set +e
          echo "===== [日志] 7-启动 Docker & CasaOS 开始 ====="
          sudo fuser -k 80/tcp 443/tcp 2>/dev/null || true
          sudo mkdir -p /run/docker 2>/dev/null || true
          sudo systemctl daemon-reload 2>/dev/null || true
          sudo systemctl enable --now docker containerd && sleep 5 2>/dev/null || true
          sudo systemctl enable --now casaos && sleep 6 2>/dev/null || true
          echo "✅ [日志] 7-Docker & CasaOS 启动完成"
          echo "===== [日志] 7-步骤结束 =====\n"

      - name: 8-稳定运行指定分钟
        if: ${{ always() }}
        run: |
          set +e
          echo "===== [日志] 8-稳定运行 $TARGET_RUN_MINUTES 分钟 开始 ====="
          RUN_SECONDS=$((TARGET_RUN_MINUTES * 60)) 2>/dev/null || true
          echo "[日志] 总等待秒数：$RUN_SECONDS"
          sleep $RUN_SECONDS 2>/dev/null || true
          echo "✅ [日志] 8-稳定运行完成"
          echo "===== [日志] 8-步骤结束 =====\n"

      - name: 9-停止业务服务（安全备份，保留Tailscale在线）
        if: ${{ always() }}
        run: |
          set +e
          echo "===== [日志] 9-停止业务服务（保留Tailscale） 开始 ====="
          sudo systemctl stop casaos docker containerd 2>/dev/null || true
          sudo pkill -9 "casaos" "docker" "containerd" 2>/dev/null || true
          sudo rm -f /var/run/docker.pid /var/run/docker.sock.lock /var/run/containerd.pid 2>/dev/null || true
          sudo umount /var/lib/docker/overlay2/*/merged 2>/dev/null || true
          sync && sleep 5 2>/dev/null || true
          echo "✅ [日志] 9-业务服务已停止"
          echo "===== [日志] 9-步骤结束 =====\n"

      - name: 10-本地全量备份（tar.zst 最高压缩 不含/root/.config）
        if: ${{ always() }}
        run: |
          set +e
          echo "===== [日志] 10-生成本地全量备份 开始 ====="
          sudo mkdir -p "$LOCAL_BACKUP_DIR" 2>/dev/null || true
          IFS=' ' read -r -a DIR_ARRAY <<< "$PERSONAL_DATA_DIRS" 2>/dev/null || true
          for dir in "${DIR_ARRAY[@]}"; do
            [ ! -d "$dir" ] && sudo mkdir -p "$dir" 2>/dev/null || true
          done
          SNAP_NAME="casaos-full-$(date +%Y%m%d-%H%M%S).tar.zst" 2>/dev/null || true
          LOCAL_FILE="$LOCAL_BACKUP_DIR/$SNAP_NAME"
          echo "[日志] 备份文件：$SNAP_NAME"
          sudo tar -I"zstd -$ZSTD_COMPRESS_LEVEL" -cf "$LOCAL_FILE" --ignore-failed-read --preserve-permissions "${DIR_ARRAY[@]}" 2>/dev/null || true
          [ -f "$LOCAL_FILE" ] && [ -s "$LOCAL_FILE" ] && echo "[日志] ✅ 备份有效" && echo "BACKUP_FILE=$LOCAL_FILE" >> $GITHUB_ENV 2>/dev/null || true && echo "SNAP_NAME=$SNAP_NAME" >> $GITHUB_ENV 2>/dev/null || true
          [ ! -f "$LOCAL_FILE" ] || [ ! -s "$LOCAL_FILE" ] && echo "[日志] ❌ 备份文件无效" || true
          echo "✅ [日志] 10-备份完成"
          echo "===== [日志] 10-步骤结束 =====\n"

      - name: 11-触发下一轮续跑【带校验+失败重发】确保一定成功
        if: ${{ always() }}
        run: |
          set +e
          echo "===== [日志] 11-带自动校验的续跑触发 开始 ====="
          [ -z "$USER_PAT" ] || [ -z "$REPO" ] && echo "⚠️ 未配置 PAT/REPO，跳过" || true
          RETRY_DISPATCH_TIMES=5
          DISPATCH_WAIT_SECONDS=10
          WORKFLOW_NAME="CasaOS纯净部署（Tailscale内网版 /aaa目录 拉取即删 无限检测删除）"
          DISPATCH_SUCCESS=0
          for ((retry=1; retry<=RETRY_DISPATCH_TIMES; retry++)); do
            echo -e "\n[日志] 第 $retry 次触发续跑..."
            curl -s -f -X POST -H "Authorization: token $USER_PAT" -H "Content-Type: application/json" https://api.github.com/repos/$REPO/dispatches -d '{"event_type":"renew_casaos_snapshot"}' >/dev/null 2>&1 || true
            sleep $DISPATCH_WAIT_SECONDS 2>/dev/null || true
            echo "[日志] 校验是否已有任务在排队/运行..."
            WF_ID=$(curl -s -H "Authorization: token $USER_PAT" "https://api.github.com/repos/$REPO/actions/workflows?per_page=15" | jq -r --arg name "$WORKFLOW_NAME" '.workflows[] | select(.name == $name) | .id' | head -1 2>/dev/null || echo "")
            [ -n "$WF_ID" ] && RUN_STATUS=$(curl -s -H "Authorization: token $USER_PAT" "https://api.github.com/repos/$REPO/actions/workflows/$WF_ID/runs?per_page=5" | jq -r '.workflow_runs[] | select(.status == "queued" or .status == "in_progress") | .status' | head -1 2>/dev/null || echo "")
            [ "$RUN_STATUS" = "queued" ] || [ "$RUN_STATUS" = "in_progress" ] && echo "✅ [日志] 续跑校验成功！当前任务状态：$RUN_STATUS" && DISPATCH_SUCCESS=1 && break
            echo "[日志] 第 $retry 次未检测到有效任务，${DISPATCH_WAIT_SECONDS}秒后重试..."
          done
          [ $DISPATCH_SUCCESS -eq 1 ] && echo "🎉 [日志] 续跑最终确认成功！" || echo "❌ [日志] 重试 $RETRY_DISPATCH_TIMES 次仍未成功"
          echo "===== [日志] 11-步骤结束 =====\n"

      - name: 12-移入/aaa并无限轮询检测删除（1分钟/次 无上限）
        if: ${{ always() }}
        run: |
          set +e
          echo "===== [日志] 12-备份移入/aaa + 无限轮询删除 开始 ====="
          [ -z "$BACKUP_FILE" ] || [ -z "$SNAP_NAME" ] && echo "ℹ️ 无备份文件，跳过" || true
          LOCAL_AAA="/aaa"
          sudo mkdir -p "$LOCAL_AAA" 2>/dev/null || true
          TARGET_FILE="$LOCAL_AAA/$SNAP_NAME"
          sudo mv -v "$BACKUP_FILE" "$TARGET_FILE" 2>/dev/null || true
          echo -e "\n[日志] ⌛ 无限轮询：文件被删除即退出，进入下一轮"
          while true; do
            [ ! -f "$TARGET_FILE" ] && echo "[日志] 🎉 文件已被拉取删除，退出轮询" && break
            echo "[日志] 文件正常，1分钟后检查..."
            sleep 60 2>/dev/null || true
          done
          echo "✅ [日志] 12-轮询结束"
          echo "===== [日志] 12-步骤结束 =====\n"

      - name: 13-最终清理+关闭Tailscale主网络
        if: ${{ always() }}
        run: |
          set +e
          echo "===== [日志] 13-最终清理 + 关闭Tailscale 开始 ====="
          sudo systemctl stop tailscaled 2>/dev/null || true
          sudo pkill -9 "tailscaled" 2>/dev/null || true
          sudo rm -rf "$LOCAL_BACKUP_DIR" /tmp/* 2>/dev/null || true
          sudo rm -f /etc/sudoers.d/roots 2>/dev/null || true
          sudo apt autoremove -y -qq && sudo apt clean -y -qq 2>/dev/null || true
          sudo rm -rf /var/cache/apt/* 2>/dev/null || true
          echo "✅ [日志] 13-清理完成，Tailscale 已关闭"
          echo "🎉 [日志] 全流程正常结束"
          echo "===== [日志] 13-步骤结束 =====\n"