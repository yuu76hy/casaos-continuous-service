name: CasaOS纯净部署（优化启动版）

on:
  workflow_dispatch:
  repository_dispatch:
    types: [renew_casaos_snapshot]

jobs:
  casaos-deploy:
    runs-on: ubuntu-24.04
    timeout-minutes: 480
    env:
      PERSONAL_DATA_DIRS: "/var/lib/docker /etc/casaos /var/lib/casaos /DATA"
      ROOTS_PASSWORD: ${{ secrets.ROOTS_PASSWORD }}
      USER_PAT: ${{ secrets.USER_PAT }}
      REPO: ${{ secrets.REPO }}
      TAILSCALE_AUTH_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
      SSH_USER: "root"
      SSH_PASS: ${{ secrets.ROOTS_PASSWORD }}
      REMOTE_BACKUP_BASE: "/aaa"
      LOCAL_BACKUP_DIR: "/tmp/casaos-backup"
      TARGET_RUN_MINUTES: 5
      RETRY_TIMES: 3
      ZSTD_COMPRESS_LEVEL: 8

    steps:
      - name: 1-系统初始化
        if: ${{ always() }}
        run: |
          set +e
          echo "===== [日志] 1-系统初始化 开始 ====="
          sudo apt update -y -qq 2>/dev/null &
          sudo apt install -y curl wget jq tar gzip lsof ca-certificates gnupg sshpass openssh-server zstd -qq 2>/dev/null &
          wait
          sudo rm -rf /usr/local/lib /usr/local/.ghcup /usr/local/julia* /usr/local/aws-* /usr/local/n \
            /opt/hostedtoolcache /opt/actionarchivecache /opt/runner-cache /opt/microsoft /opt/google \
            /tmp/* /var/tmp/* ~/.cache/* /root/.cache/* /var/cache/apt/* 2>/dev/null &
          sudo DEBIAN_FRONTEND=noninteractive apt autoremove --purge -y 2>/dev/null &
          sudo DEBIAN_FRONTEND=noninteractive apt clean 2>/dev/null &
          wait
          sync && sudo sysctl -w vm.drop_caches=3 2>/dev/null || true
          sudo systemctl enable --now ssh || true
          echo "✅ [日志] 1-系统初始化完成"
      
      - name: 2-并行安装 Docker + CasaOS + 配置root
        if: ${{ always() }}
        run: |
          set +e
          echo "===== [日志] 2-并行安装 Docker + CasaOS + 用户配置 开始 ====="
          
          install_docker() {
            echo "[Docker] 开始安装..."
            export DEBIAN_FRONTEND=noninteractive
            curl -fsSL https://get.docker.com | sudo bash 2>/dev/null
            sudo systemctl enable docker containerd 2>/dev/null
            sudo usermod -aG docker runner 2>/dev/null
            echo "[Docker] 安装完成"
          }
          
          install_casaos() {
            echo "[CasaOS] 开始安装..."
            curl -fsSL https://get.casaos.io | sudo bash 2>/dev/null
            echo "[CasaOS] 安装完成"
          }
          
          config_user() {
            echo "[用户] 配置 root..."
            if [ -n "$SSH_PASS" ]; then
              echo "root:$SSH_PASS" | sudo chpasswd
              sudo sed -i 's/^#PermitRootLogin.*/PermitRootLogin yes/' /etc/ssh/sshd_config 2>/dev/null
              sudo sed -i 's/^PermitRootLogin.*/PermitRootLogin yes/' /etc/ssh/sshd_config 2>/dev/null
              sudo sed -i 's/^#PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config 2>/dev/null
              sudo sed -i 's/^PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config 2>/dev/null
              sudo systemctl restart ssh
            fi
            echo "[用户] 配置完成"
          }
          
          install_docker &
          PID_DOCKER=$!
          install_casaos &
          PID_CASAOS=$!
          config_user &
          PID_USER=$!
          
          wait $PID_DOCKER $PID_CASAOS $PID_USER
          
          sudo systemctl stop docker containerd casaos 2>/dev/null || true
          echo "✅ [日志] 2-并行安装完成"
      
      - name: 3-Tailscale 组网
        if: ${{ always() }}
        run: |
          set +e
          echo "===== [日志] 3-Tailscale组网 开始 ====="
          if [ -z "$TAILSCALE_AUTH_KEY" ]; then
            echo "⚠️ [日志] Tailscale 未配置，跳过"
            exit 0
          fi
          curl -fsSL https://tailscale.com/install.sh | sudo bash 2>/dev/null &
          wait
          sudo systemctl enable --now tailscaled && sleep 1
          TS_SUFFIX=$((RANDOM % 1000))
          TS_HOSTNAME="CasaOS-${TS_SUFFIX}"
          sudo tailscale up --authkey="$TAILSCALE_AUTH_KEY" --hostname="$TS_HOSTNAME" --accept-routes --reset 2>/dev/null &
          wait
          LOCAL_IP=$(hostname -I | awk '{print $1}')
          TAILSCALE_IP=$(sudo tailscale ip -4 2>/dev/null || echo "获取失败")
          echo "物理内网IP: $LOCAL_IP"
          echo "Tailscale内网IP: $TAILSCALE_IP"
          echo "✅ [日志] 3-Tailscale 组网完成"
      
      - name: 4-快速拉取备份并恢复
        if: ${{ always() }}
        run: |
          set +e
          echo "===== [日志] 4-拉取备份 开始 ====="
          if [ -z "$TAILSCALE_AUTH_KEY" ] || [ -z "$SSH_PASS" ]; then
            echo "ℹ️ [日志] 未配置 Tailscale/SSH，纯净启动"
            exit 0
          fi
          
          TS_STATUS_JSON=$(sudo tailscale status --json 2>/dev/null)
          SELF_ID=$(echo "$TS_STATUS_JSON" | jq -r '.Self.ID')
          
          TARGET_IP=$(echo "$TS_STATUS_JSON" | jq -r --arg self "$SELF_ID" '
            .Peer[] |
            select(.Online == true) |
            select(.ID != $self) |
            select((.HostName | tostring | ascii_downcase) | contains("casaos")) |
            .TailscaleIPs[0]
          ' | head -1)
          
          if [ -z "$TARGET_IP" ]; then
            echo "ℹ️ [日志] 未找到符合条件节点，纯净启动"
            exit 0
          fi
          
          echo "目标节点IP: $TARGET_IP"
          
          sudo systemctl stop docker containerd casaos 2>/dev/null || true
          sudo pkill -9 "casaos" "docker" "containerd" 2>/dev/null || true
          sync && sleep 2
          
          sudo mkdir -p "$LOCAL_BACKUP_DIR"
          
          LATEST_FILE=$(sshpass -p "$SSH_PASS" ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 \
            "$SSH_USER@$TARGET_IP" "ls -t \"$REMOTE_BACKUP_BASE\"/casaos-*.tar.zst 2>/dev/null | head -1")
          
          if [ -z "$LATEST_FILE" ]; then
            echo "⚠️ [日志] 无备份文件，纯净启动"
            exit 0
          fi
          
          LOCAL_FILE="$LOCAL_BACKUP_DIR/$(basename "$LATEST_FILE")"
          
          if sudo sshpass -p "$SSH_PASS" scp -o StrictHostKeyChecking=no -o ConnectTimeout=10 \
            "$SSH_USER@$TARGET_IP:$LATEST_FILE" "$LOCAL_FILE" 2>/dev/null; then
            echo "拉取成功，删除远程文件"
            sshpass -p "$SSH_PASS" ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 \
              "$SSH_USER@$TARGET_IP" "sudo rm -f '$LATEST_FILE'" 2>/dev/null || true
            
            echo "解压恢复..."
            sudo tar --zstd -xf "$LOCAL_FILE" -C / --overwrite --preserve-permissions 2>/dev/null
            
            for dir in $PERSONAL_DATA_DIRS; do
              [ -d "$dir" ] && sudo chown -R root:root "$dir"
            done
            echo "✅ [日志] 4-恢复完成"
          else
            echo "⚠️ [日志] 拉取失败，纯净启动"
          fi
      
      - name: 5-启动服务
        if: ${{ always() }}
        run: |
          set +e
          echo "===== [日志] 5-启动服务 开始 ====="
          sudo fuser -k 80/tcp 443/tcp 2>/dev/null || true
          sudo mkdir -p /run/docker 2>/dev/null
          sudo systemctl daemon-reload
          sudo systemctl enable --now docker containerd && sleep 3
          sudo systemctl enable --now casaos && sleep 3
          echo "✅ [日志] 5-服务启动完成"
      
      - name: 6-稳定运行
        if: ${{ always() }}
        run: |
          echo "===== [日志] 6-稳定运行 $TARGET_RUN_MINUTES 分钟 ====="
          sleep $((TARGET_RUN_MINUTES * 60))
          echo "✅ [日志] 6-运行完成"
      
      - name: 7-停止服务并备份
        if: ${{ always() }}
        run: |
          set +e
          echo "===== [日志] 7-备份 开始 ====="
          sudo systemctl stop casaos docker containerd 2>/dev/null || true
          sudo pkill -9 "casaos" "docker" "containerd" 2>/dev/null || true
          sync && sleep 3
          
          sudo mkdir -p "$LOCAL_BACKUP_DIR"
          IFS=' ' read -r -a DIR_ARRAY <<< "$PERSONAL_DATA_DIRS"
          for dir in "${DIR_ARRAY[@]}"; do
            [ ! -d "$dir" ] && sudo mkdir -p "$dir"
          done
          
          SNAP_NAME="casaos-full-$(date +%Y%m%d-%H%M%S).tar.zst"
          LOCAL_FILE="$LOCAL_BACKUP_DIR/$SNAP_NAME"
          
          sudo tar -I"zstd -$ZSTD_COMPRESS_LEVEL" -cf "$LOCAL_FILE" \
            --ignore-failed-read --preserve-permissions "${DIR_ARRAY[@]}" 2>/dev/null
          
          if [ -f "$LOCAL_FILE" ] && [ -s "$LOCAL_FILE" ]; then
            echo "BACKUP_FILE=$LOCAL_FILE" >> $GITHUB_ENV
            echo "SNAP_NAME=$SNAP_NAME" >> $GITHUB_ENV
            echo "✅ [日志] 7-备份完成"
          fi
      
      - name: 8-触发续跑
        if: ${{ always() }}
        run: |
          set +e
          echo "===== [日志] 8-触发续跑 ====="
          if [ -z "$USER_PAT" ] || [ -z "$REPO" ]; then
            exit 0
          fi
          
          curl -s -f -X POST \
            -H "Authorization: token $USER_PAT" \
            -H "Content-Type: application/json" \
            https://api.github.com/repos/$REPO/dispatches \
            -d '{"event_type":"renew_casaos_snapshot"}' 2>/dev/null
          echo "✅ [日志] 8-续跑已触发"
      
      - name: 9-移入/aaa并轮询
        if: ${{ always() }}
        run: |
          set +e
          echo "===== [日志] 9-移入/aaa并轮询 ====="
          if [ -z "$BACKUP_FILE" ]; then
            exit 0
          fi
          
          LOCAL_AAA="/aaa"
          sudo mkdir -p "$LOCAL_AAA"
          TARGET_FILE="$LOCAL_AAA/$SNAP_NAME"
          sudo mv -v "$BACKUP_FILE" "$TARGET_FILE"
          
          while true; do
            [ ! -f "$TARGET_FILE" ] && echo "文件已被删除，退出" && break
            sleep 60
          done
          echo "✅ [日志] 9-轮询结束"
